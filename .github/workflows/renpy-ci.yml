name: Ren'Py CI (Fixed)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  full-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pylint black

      - name: Black check
        run: |
          black --check $(find . -name "*.py" -not -path "./.git/*" -not -path "./venv/*" -not -path "./__pycache__/*") || true

      - name: Pylint
        run: |
          pylint $(find . -name "*.py" -not -path "./.git/*" -not -path "./venv/*") || true

      - name: Run Ren'Py Lint
        run: |
          echo "🚀 Running Ren'Py Lint..."
          # Используем твою локальную версию Ren'Py
          ./renpy.sh . lint --error-on-any
          