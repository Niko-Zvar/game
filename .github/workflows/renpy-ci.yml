name: Ren'Py CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  full-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pylint black

      - name: Cache Ren'Py SDK
        id: cache-renpy
        uses: actions/cache@v4
        with:
          path: renpy
          key: renpy-sdk-8.5.2-${{ runner.os }}

      - name: Download Ren'Py SDK
        if: steps.cache-renpy.outputs.cache-hit != 'true'
        run: |
          echo "Downloading Ren'Py 8.5.2 SDK..."
          curl -L -o renpy.tar.bz2 https://www.renpy.org/dl/8.5.2/renpy-8.5.2-sdk.tar.bz2
          tar -xjf renpy.tar.bz2
          mv renpy-8.5.2-sdk renpy
          chmod +x renpy/renpy.sh

      - name: Clean old compiled files
        run: |
          echo "Cleaning old .rpyc files..."
          find . -name "*.rpyc" -delete 2>/dev/null || true
          find . -name "*.rpymc" -delete 2>/dev/null || true
          rm -rf __pycache__ game/__pycache__ 2>/dev/null || true

      - name: Black check
        run: |
          # Проверяем форматирование Python файлов
          black --check $(find . -name "*.py" -not -path "./.git/*" -not -path "./venv/*" -not -path "./__pycache__/*") || true

      - name: Pylint
        run: |
          # Проверяем качество кода
          pylint $(find . -name "*.py" -not -path "./.git/*" -not -path "./venv/*") || true


      - name: Run Ren'Py Lint (Scoped)
        run: |
          echo "🚀 Running Ren'Py Lint..."
          
          # Создаем список файлов .rpy, исключая папку SDK
          # Используем xargs для безопасной передачи аргументов
          find . -name "*.rpy" -not -path "./renpy/*" -not -path "./.git/*" -print0 | \
            xargs -0 -r ./renpy/renpy.sh lint --error-on-any --no-warn
          