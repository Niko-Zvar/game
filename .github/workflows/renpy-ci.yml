name: Ren'Py CI (Fixed)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  full-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: ./game-source # Выгружаем код в отдельную папку

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f game-source/requirements.txt ]; then pip install -r game-source/requirements.txt; fi
          pip install pylint black

      - name: Black check
        run: |
          black --check $(find game-source -name "*.py" -not -path "./.git/*" -not -path "./venv/*" -not -path "./__pycache__/*" -not -path "./renpy/*")

      - name: Pylint
        run: |
          pylint $(find game-source -name "*.py" -not -path "./.git/*" -not -path "./venv/*" -not -path "./__pycache__/*" -not -path "./renpy/*")

      - name: Clean, Download SDK and Run Lint
        run: |
          cd /home/runner/work/game

          echo "🧹 Deep clean..."
          find ./game-source -name "*.rpyc" -delete 2>/dev/null || true
          find ./game-source -name "*.rpymc" -delete 2>/dev/null || true
          rm -rf ./game-source/__pycache__ ./game-source/game/__pycache__ 2>/dev/null || true

          echo "⬇️ Downloading Ren'Py 8.5.2 SDK..."
          curl -L -o renpy.tar.bz2 https://www.renpy.org/dl/8.5.2/renpy-8.5.2-sdk.tar.bz2
          tar -xjf renpy.tar.bz2
          mv renpy-8.5.2-sdk renpy
          chmod +x renpy/renpy.sh

          echo "🚀 Running Ren'Py Lint..."
          ./renpy/renpy.sh ./game-source/game lint --error-on-any
