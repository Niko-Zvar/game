name: Ren'Py CI (Docker)

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  renpy-lint:
    runs-on: ubuntu-latest
    container:
      image: renpy/renpy:latest
      options: --user root

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Python linters
        run: |
          pip install black pylint

      - name: Black check
        run: |
          black --check $(find . -name "*.py" -not -path "./.git/*" -not -path "./venv/*" -not -path "./__pycache__/*") || true

      - name: Pylint
        run: |
          pylint $(find . -name "*.py" -not -path "./.git/*" -not -path "./venv/*") || true

      - name: Run Ren'Py Lint
        run: |
          # Запускаем линтер внутри контейнера. 
          # Мы передаем точку "." как корень проекта.
          # Флаг --error-on-any останавливает при любой ошибке.
          renpy . lint --error-on-any
          